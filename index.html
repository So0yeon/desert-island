<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>무인도에서 살아남기: AI 로봇과 함께라면?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Gowun+Dodum&family=Gowun+Batang:wght@400;700&family=Gaegu:wght@400;700&family=Nanum+Gothic+Coding:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   무인도에서 살아남기: AI 로봇과 함께라면?
   교육용 인터랙티브 탐험 스토리 게임
   ============================================================ */

:root{
  --sky-top:#ffd89b; --sky-bot:#86c7d6; --sea:#3fa9bd;
  --sand:#f3e0b5; --ink:#2a2320; --paper:#fbf3df; --ink-on-light:#2a2320;
  --accent:#e98a3c; --accent2:#1fb6c9;
  --ai:#19d3e6; --ai-deep:#0a7d8c;
  --warm:#e98a3c; --danger:#e0584b;
  --card:#fff7e6; --line:#d8c39a;
  --shadow:rgba(60,40,20,.25);
  --vignette:0;
  --display:'Black Han Sans',sans-serif;
  --head:'Do Hyeon',sans-serif;
  --body:'Gowun Dodum',sans-serif;
  --hand:'Gaegu',cursive;
  --mono:'Nanum Gothic Coding',monospace;
  --mood:0; /* 0 warm -> 1 cold */
}
/* 막별 분위기 전환 */
body[data-act="2"]{--sky-top:#ffcf8f;--sky-bot:#7bbfd0;--accent:#e98a3c;}
body[data-act="3"]{--sky-top:#cdd6cf;--sky-bot:#6fb0c2;--sea:#3a98b0;--accent:#37a7bb;--sand:#e7ddc6;--vignette:.08;}
body[data-act="4"]{--sky-top:#b9c4c6;--sky-bot:#5f97aa;--accent:#2f9fb4;--sand:#ddd3c0;--vignette:.16;}
body[data-act="5"]{--sky-top:#9aa6ad;--sky-bot:#4f7e92;--accent:#1fb6c9;--sand:#cfc8ba;--ink:#241f1c;--vignette:.26;}
body[data-act="6"]{--sky-top:#7c8790;--sky-bot:#3c6376;--accent:#19d3e6;--sand:#bcb6ac;--vignette:.36;}
body[data-act="finale"]{--sky-top:#2b3742;--sky-bot:#16242e;--accent:#19d3e6;--sand:#5a5650;--ink:#f0ead8;--paper:#243038;--card:#1d2932;--line:#37505c;--vignette:.5;}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:var(--body);
  color:var(--ink);
  background:#1a2530;
  overflow:hidden;
  transition:background 1.2s ease;
  user-select:none;
}
#app{
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(120% 90% at 50% -10%, var(--sky-top) 0%, var(--sky-bot) 55%, var(--sea) 100%);
  transition:background 1.2s ease;
}
#app::after{ /* vignette mood */
  content:''; position:absolute; inset:0; pointer-events:none;
  box-shadow:inset 0 0 240px 40px rgba(8,16,24,calc(var(--vignette)));
  transition:box-shadow 1.2s ease;
  background:radial-gradient(140% 100% at 50% 120%, transparent 60%, rgba(6,14,22,calc(var(--vignette)*.9)) 100%);
}
.stage{
  position:relative; width:min(900px,100%); height:min(680px,100%);
  display:flex; flex-direction:column;
}

/* 스크롤 가능한 본문 */
.scroll{overflow-y:auto; -webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:8px;}
.scroll::-webkit-scrollbar-thumb{background:rgba(120,90,50,.4);border-radius:8px;}

/* ---------- 버튼 ---------- */
button{font-family:var(--body); cursor:pointer; border:none; background:none; color:inherit;}
.btn{
  font-family:var(--head); font-size:17px; letter-spacing:.02em;
  background:linear-gradient(180deg,var(--accent),color-mix(in srgb,var(--accent) 70%, #000 20%));
  color:#fff; padding:13px 24px; border-radius:16px;
  box-shadow:0 6px 0 rgba(0,0,0,.18), 0 8px 18px var(--shadow);
  transition:transform .08s, box-shadow .08s, filter .15s;
}
.btn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.18),0 4px 10px var(--shadow);}
.btn.ghost{background:transparent;color:var(--ink);box-shadow:none;border:2px dashed var(--line);}
.btn.small{font-size:14px;padding:9px 16px;border-radius:12px;}

/* ============ 타이틀 화면 ============ */
#title-screen{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;text-align:center;
  padding:0 28px 54px;overflow:hidden;
  background-position:center;background-size:cover;background-repeat:no-repeat;
}
/* 배경 사진 위 가독성용 스크림(위 투명 → 아래 짙게) */
#title-screen::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg, rgba(10,20,28,.18) 0%, rgba(10,20,28,.05) 38%, rgba(8,16,24,.62) 78%, rgba(6,12,20,.85) 100%);
}
.title-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;animation:fade .9s ease;}
.title-kicker{
  font-family:var(--head);color:rgba(255,255,255,.92);font-size:clamp(11px,2.6vw,14px);
  letter-spacing:.42em;text-transform:uppercase;margin-bottom:16px;padding-left:.42em;
  text-shadow:0 2px 10px rgba(0,0,0,.6);
}
#title-screen h1{
  font-family:'Gowun Batang', serif; font-weight:700; color:#fff;
  line-height:1.28; letter-spacing:.04em;
  font-size:clamp(33px,8.4vw,58px);
  text-shadow:0 2px 22px rgba(0,0,0,.55), 0 1px 3px rgba(0,0,0,.6);
}
.title-rule{width:54px;height:2px;background:rgba(255,255,255,.7);margin:20px 0;
  box-shadow:0 1px 6px rgba(0,0,0,.5);}
#title-screen .sub{
  font-family:'Gowun Batang', serif; color:#fff; font-weight:400;
  font-size:clamp(16px,3.8vw,21px); letter-spacing:.06em; margin-bottom:30px;
  text-shadow:0 2px 12px rgba(0,0,0,.6);
}
#title-screen .start-btn{
  font-family:var(--head);font-size:17px;letter-spacing:.12em;color:#2a2320;
  background:rgba(255,255,255,.95);padding:14px 34px;border-radius:40px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);transition:transform .08s,box-shadow .12s;
  backdrop-filter:blur(2px);
}
#title-screen .start-btn:active{transform:translateY(3px);box-shadow:0 4px 14px rgba(0,0,0,.4);}
#title-screen .caption{color:rgba(255,255,255,.82);margin-top:20px;font-size:12px;letter-spacing:.06em;
  text-shadow:0 1px 6px rgba(0,0,0,.6);}

/* ============ 일반 패널 / 내레이션 ============ */
.panel{
  background:var(--paper); border-radius:22px; padding:26px 24px;
  box-shadow:0 20px 50px rgba(0,0,0,.3); border:3px solid var(--line);
  max-width:560px; width:calc(100% - 36px); position:relative;
}
.panel h2{font-family:var(--display);font-size:26px;margin-bottom:6px;color:var(--accent);}
.panel p{font-size:17px;line-height:1.75;margin-bottom:10px;}
.kicker{font-family:var(--head);font-size:13px;letter-spacing:.18em;color:var(--accent2);text-transform:uppercase;margin-bottom:8px;}

/* 이름 입력 */
.name-input{
  font-family:var(--head);font-size:22px;text-align:center;width:100%;
  padding:14px;border:3px dashed var(--accent);border-radius:14px;background:#fff;color:var(--ink-on-light);
  margin:14px 0;outline:none;
}

/* ============ 지도(허브) ============ */
#map-screen{position:absolute;inset:0;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,.18),transparent);
}
.daytag{font-family:var(--display);color:#fff;font-size:18px;text-shadow:0 2px 6px rgba(0,0,0,.4);}
.objective{
  margin-left:auto;background:rgba(255,255,255,.92);border-radius:30px;padding:7px 16px;
  font-family:var(--head);font-size:14px;color:var(--ink);box-shadow:0 4px 12px var(--shadow);
  display:flex;align-items:center;gap:7px;max-width:62%;
}
.objective .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);animation:ping 1.4s infinite;}
@keyframes ping{50%{transform:scale(1.7);opacity:.4;}}
.journal-btn{background:rgba(255,255,255,.92);border-radius:14px;padding:8px 12px;font-family:var(--head);
  font-size:14px;box-shadow:0 4px 12px var(--shadow);}

.island{flex:1;position:relative;background-position:center;background-size:cover;background-repeat:no-repeat;}
.island::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg, rgba(8,16,24,.10), rgba(8,16,24,.04) 40%, rgba(8,16,24,.22));}
.island-bg{position:absolute;inset:0;}
.loc{
  position:absolute;transform:translate(-50%,-50%);text-align:center;cursor:pointer;
  transition:transform .12s;z-index:2;
}
.loc:active{transform:translate(-50%,-50%) scale(.92);}
.loc .pin{
  width:74px;height:74px;border-radius:24px;display:flex;align-items:center;justify-content:center;
  font-size:38px;background:var(--card);border:3px solid var(--line);
  box-shadow:0 8px 0 rgba(0,0,0,.12),0 10px 20px var(--shadow);
}
.loc .nm{font-family:var(--head);color:#fff;font-size:13px;margin-top:6px;text-shadow:0 2px 5px rgba(0,0,0,.55);
  background:rgba(0,0,0,.28);padding:2px 9px;border-radius:20px;display:inline-block;}
.loc.locked{filter:grayscale(1) brightness(.7);opacity:.55;pointer-events:none;}
.loc.locked .pin{border-style:dashed;}
.loc .alert{position:absolute;top:-6px;right:-2px;width:22px;height:22px;border-radius:50%;
  background:var(--danger);color:#fff;font-family:var(--head);font-size:13px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 4px rgba(224,88,75,.3);animation:ping 1.3s infinite;}

/* ============ 장소 화면 ============ */
#location-screen{position:absolute;inset:0;display:flex;flex-direction:column;background-position:center;background-size:cover;background-repeat:no-repeat;}
.loc-header{padding:14px 16px;display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,rgba(0,0,0,.2),transparent);}
.loc-header .big{font-size:34px;}
.loc-header .t{font-family:var(--display);color:#fff;font-size:24px;text-shadow:0 3px 8px rgba(0,0,0,.45);}
.loc-body{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 16px 16px;gap:14px;}
.loc-desc{color:#fff;text-align:center;font-size:16px;line-height:1.7;max-width:520px;
  background:rgba(0,0,0,.22);padding:14px 18px;border-radius:18px;}
.actions{display:flex;flex-direction:column;gap:11px;width:min(440px,100%);}
.action-card{
  background:var(--card);border:2px solid var(--line);border-radius:16px;padding:15px 18px;
  display:flex;align-items:center;gap:13px;box-shadow:0 6px 14px var(--shadow);
  transition:transform .1s,box-shadow .1s;cursor:pointer;text-align:left;
}
.action-card:active{transform:scale(.97);}
.action-card .ic{font-size:26px;flex-shrink:0;}
.action-card .lab{font-family:var(--head);font-size:16px;}
.action-card .sub{font-size:13px;opacity:.7;}
.action-card.story{border-color:var(--accent);background:#fff4e0;}
.action-card.story::after{content:'❗';margin-left:auto;}
.action-card.explore::after{content:'🔍';margin-left:auto;opacity:.5;}

/* ============ 장면 오버레이(대화/이벤트) ============ */
#scene-overlay{position:absolute;inset:0;display:none;flex-direction:column;justify-content:flex-end;
  background:rgba(8,14,20,.55);backdrop-filter:blur(2px);z-index:40;}
#scene-overlay.on{display:flex;}
.scene-box{
  background:var(--paper);border-top:4px solid var(--accent);border-radius:26px 26px 0 0;
  padding:22px 22px 26px;box-shadow:0 -14px 40px rgba(0,0,0,.4);
  max-height:78%;display:flex;flex-direction:column;animation:slideUp .35s ease;
}
@keyframes slideUp{from{transform:translateY(60px);opacity:0;}}
.speaker{font-family:var(--head);font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.speaker .av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.av.ai{background:linear-gradient(135deg,var(--ai),var(--ai-deep));color:#012;box-shadow:0 0 12px rgba(25,211,230,.6);}
.av.dog{background:linear-gradient(135deg,#f6c46a,#d98b2b);}
.av.me{background:linear-gradient(135deg,#9fd39a,#5a9e6f);}
.av.sys{background:#cfc2a4;}
.scene-text{font-size:18px;line-height:1.8;min-height:30px;}
.scene-text.ai-line{font-family:var(--mono);color:var(--ai-deep);letter-spacing:.01em;}
.scene-text.narr{color:#5a4d3c;font-style:italic;}
.scene-text.think{color:#6a5a8a;}
/* 최종장: 대화 상자가 어두운 색이므로 글씨를 밝게 */
body[data-act="finale"] .scene-text{color:var(--ink);}
body[data-act="finale"] .scene-text.narr{color:#cbbf9f;}
body[data-act="finale"] .scene-text.think{color:#c3b3df;}
body[data-act="finale"] .scene-text.ai-line{color:var(--ai);}
.scene-foot{margin-top:18px;display:flex;flex-direction:column;gap:10px;}
.choice-card{
  background:#fff;border:2px solid var(--line);border-radius:14px;padding:14px 16px;text-align:left;
  color:var(--ink-on-light);
  font-size:16px;line-height:1.5;transition:transform .08s,border-color .12s,background .12s;cursor:pointer;
}
.choice-card:hover{border-color:var(--accent);background:#fff7e8;}
.choice-card:active{transform:scale(.98);}
.choice-card .ch-ic{margin-right:8px;}
.tap-hint{align-self:flex-end;font-size:13px;opacity:.6;font-family:var(--head);animation:blink 1.4s infinite;}
@keyframes blink{50%{opacity:.2;}}

/* AI 로그 카드 */
.logcard{background:#06222a;border:1px solid var(--ai-deep);border-radius:12px;padding:14px 16px;
  font-family:var(--mono);color:var(--ai);font-size:14px;line-height:1.7;box-shadow:inset 0 0 30px rgba(25,211,230,.12);}
.logcard .lh{color:#7fe;opacity:.7;font-size:11px;letter-spacing:.2em;margin-bottom:6px;}

/* 획득 토스트 */
#toast{position:absolute;top:64px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--ink);color:var(--paper);padding:11px 20px;border-radius:30px;font-family:var(--head);font-size:15px;
  box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;transition:.4s;z-index:60;pointer-events:none;display:flex;gap:8px;align-items:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ============ 수집/일지 패널 ============ */
#journal-screen{position:absolute;inset:0;display:none;flex-direction:column;background:var(--sea);z-index:50;}
#journal-screen.on{display:flex;}
.jtop{padding:14px 16px;display:flex;align-items:center;gap:10px;}
.jtop .t{font-family:var(--display);color:#fff;font-size:24px;}
.tabs{display:flex;gap:8px;padding:0 16px 10px;}
.tab{font-family:var(--head);font-size:14px;background:rgba(255,255,255,.85);padding:8px 14px;border-radius:30px;}
.tab.active{background:var(--accent);color:#fff;}
.jbody{flex:1;padding:0 16px 20px;}
.jitem{background:var(--paper);border:2px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:11px;}
.jitem .jt{font-family:var(--head);font-size:16px;margin-bottom:4px;display:flex;gap:8px;align-items:center;}
.jitem .jd{font-size:14px;line-height:1.6;opacity:.85;}
.jitem.log{background:#06222a;border-color:var(--ai-deep);}
.jitem.log .jt,.jitem.log .jd{color:var(--ai);font-family:var(--mono);}
.empty{color:#fff;text-align:center;opacity:.8;margin-top:30px;font-size:15px;}

/* ============ 엔딩 화면 ============ */
#ending-screen{position:absolute;inset:0;display:none;flex-direction:column;z-index:55;}
#ending-screen.on{display:flex;}
.end-hero{height:46%;position:relative;overflow:hidden;background:#13202a;display:flex;align-items:center;justify-content:center;}
.end-hero img{width:100%;height:100%;object-fit:cover;}
.end-hero .ph{font-size:90px;filter:drop-shadow(0 8px 16px rgba(0,0,0,.4));}
.end-hero .badge{position:absolute;bottom:14px;left:18px;background:rgba(0,0,0,.5);color:#fff;
  font-family:var(--head);font-size:14px;padding:6px 14px;border-radius:30px;}
.end-body{flex:1;background:var(--paper);border-radius:26px 26px 0 0;margin-top:-22px;padding:26px 24px;position:relative;}
.end-body h2{font-family:var(--display);font-size:30px;color:var(--accent);margin-bottom:4px;}
.end-body .etag{font-family:var(--head);color:var(--accent2);margin-bottom:14px;}
.end-body p{font-size:16px;line-height:1.8;margin-bottom:12px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
.statbox{background:#fff;border:2px solid var(--line);border-radius:14px;padding:11px 13px;color:var(--ink-on-light);}
.statbox .sn{font-family:var(--head);font-size:14px;display:flex;justify-content:space-between;margin-bottom:6px;}
.bar{height:9px;background:#e7dcc2;border-radius:6px;overflow:hidden;}
.bar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1.1s ease;}
.reflect{background:#fff4e0;border-left:5px solid var(--accent);border-radius:0 14px 14px 0;padding:14px 16px;margin:14px 0;font-size:15px;line-height:1.8;color:var(--ink-on-light);}

.center{display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;height:100%;gap:18px;}
.fade-in{animation:fade .6s ease;}
@keyframes fade{from{opacity:0;transform:translateY(12px);}}
.dim{opacity:.65;font-size:14px;}
.glitch{animation:gl .14s steps(2) infinite;}
@keyframes gl{50%{transform:translate(1px,-1px);}}
</style>
</head>
<body data-act="1">
<div id="app">
  <div class="stage" id="stage">

    <!-- 타이틀 -->
    <div id="title-screen">
      <div class="title-inner">
        <div class="title-kicker">AI Survival Story</div>
        <h1>무인도에서 살아남기</h1>
        <div class="title-rule"></div>
        <div class="sub">AI 로봇과 함께라면?</div>
        <button class="start-btn" onclick="Game.start()">모험 시작하기 ▸</button>
        <p class="caption">초등 6학년 · 약 20분 · 탐험형 스토리</p>
      </div>
    </div>

    <!-- 지도 -->
    <div id="map-screen" style="display:none;">
      <div class="topbar">
        <span class="daytag" id="daytag">표류 1일차</span>
        <div class="objective"><span class="dot"></span><span id="objective-text">해변을 둘러보자</span></div>
      </div>
      <div class="island" id="island"></div>
      <div style="padding:10px 16px;display:flex;justify-content:center;">
        <button class="journal-btn" onclick="Game.openJournal()">🎒 수집한 기록 보기</button>
      </div>
    </div>

    <!-- 장소 -->
    <div id="location-screen" style="display:none;">
      <div class="loc-header">
        <button class="btn ghost small" onclick="Game.toMap()" style="color:#fff;border-color:rgba(255,255,255,.6);">◂ 지도</button>
        <span class="big" id="loc-emoji">🌊</span>
        <span class="t" id="loc-title">해변</span>
      </div>
      <div class="loc-body scroll">
        <div class="loc-desc" id="loc-desc"></div>
        <div class="actions" id="loc-actions"></div>
      </div>
    </div>

    <!-- 장면 오버레이 -->
    <div id="scene-overlay">
      <div class="scene-box scroll" id="scene-box"></div>
    </div>

    <!-- 일지/수집 -->
    <div id="journal-screen">
      <div class="jtop">
        <button class="btn ghost small" onclick="Game.closeJournal()" style="color:#fff;border-color:rgba(255,255,255,.7);">◂ 닫기</button>
        <span class="t">수집한 기록</span>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="Game.jtab('log',this)">📡 AI 로그</div>
        <div class="tab" onclick="Game.jtab('item',this)">🎒 물건</div>
        <div class="tab" onclick="Game.jtab('diary',this)">📖 생존 일지</div>
      </div>
      <div class="jbody scroll" id="jbody"></div>
    </div>

    <!-- 엔딩 -->
    <div id="ending-screen">
      <div class="end-hero" id="end-hero"></div>

/* ============================================================
   장면 완료 후 후처리
   ============================================================ */
function SCENE_DONE(id){
  switch(id){
    case "b_robot":
      S.flags.named_ai=true; unlock("camp"); unlock("forest");
      setObjective("목이 마르다. 해변에서 물을 찾자."); break;
    case "b_water":
      setObjective("캠프에서 쉬자. 하늘이 좀 이상한데..."); break;
    case "c_storm":
      advanceAct(2); break;
    case "f_dog":
      unlock("den"); unlock("cliff");
      setObjective("{dog}와 캠프로. {ai}에 대해 생각해보자."); break;
    case "c_relate":
      advanceAct(3); break;
    case "advance4": advanceAct(4); break;
    case "c_plan": break;
    case "advance5": advanceAct(5); break;
    case "advance6": advanceAct(6); break;
    case "advanceFinale": advanceAct("finale"); break;
    case "goto_workshop":
      Game.toLocation("workshop");
      S.done["w_break"]=true;
      playScene(SCENES["w_break"], "w_break");
      return; // 정비소에서 즉시 최종 장면
    case "interview":
      // 인터뷰 마지막 질문 이어서 재생
      playScene(interviewQuestion(), "endquestion"); return;
    case "endquestion": break;
    case "finish":
      showEnding(); return;
  }
  // 막 전환을 일으키는 effect 처리
  Game.toMap();
}

/* effect 키를 SCENE_DONE id로 매핑 */
function resolveEffect(eff){
  if(eff==="did_signal"){ S.flags.did_signal=true; return null; }
  if(eff==="advance4") return "advance4";
  if(eff==="advance5") return "advance5";
  if(eff==="advance6") return "advance6";
  if(eff==="advanceFinale") return "advanceFinale";
  if(eff==="goto_workshop") return "goto_workshop";
  if(eff==="interview") return "interview";
  if(eff==="endquestion") return "endquestion";
  if(eff==="finish") return "finish";
  return null;
}

function unlock(loc){ S.unlocked[loc]=true; }

function setObjective(txt){
  S.objText=T(txt);
  if($("objective-text")) $("objective-text").textContent=S.objText;
}

function advanceAct(a){
  S.act=a;
  document.body.setAttribute("data-act", a);
  if(a===2){ unlock("cliff"); unlock("den"); }
  if(a===3){ unlock("cliff"); unlock("workshop"); unlock("observatory"); }
  const info=ACTS[a];
  if(info){ S.day=info.day; setObjective(info.obj); }
  $("daytag").textContent = "표류 "+S.day+"일차";
}

function toast(icon,txt){
  const t=$("toast");
  t.innerHTML = `<span style="font-size:20px">${icon}</span><span>${T(txt)}</span>`;
  t.classList.add("show");
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove("show"),2200);
}

/* ---- 장면 재생 ---- */
function playScene(beats, doneId){
  scene={beats:JSON.parse(JSON.stringify(beats)), i:0, doneId};
  $("scene-overlay").classList.add("on");
  renderBeat();
}

function renderBeat(){
  const box=$("scene-box");
  if(scene.i>=scene.beats.length){ endScene(); return; }
  const b=scene.beats[scene.i];

  // 대사/내레이션 beat에 직접 붙은 효과 적용 (한 번만)
  if(b._applied!==true && (b.fx||b.flag||b.rel||b.self)){
    if(b.fx) for(const k in b.fx) S.stats[k]=(S.stats[k]||0)+b.fx[k];
    if(b.flag) for(const k in b.flag) S.flags[k]=b.flag[k];
    if(b.rel) S.reliance+=b.rel;
    if(b.self) S.selfwork+=b.self;
    b._applied=true;
  }

  // 즉시 처리형(이펙트/획득)
  if(b.effect!==undefined){
    const mapped=resolveEffect(b.effect);
    if(mapped){ scene.doneId=mapped; scene.i=scene.beats.length; endScene(); return; }
    scene.i++; renderBeat(); return;
  }
  if(b.log){ addLog(b.log); scene.i++; renderBeat(); return; }
  if(b.item){ addItem(b.item); scene.i++; renderBeat(); return; }

  // 이름 입력
  if(b.name){
    box.innerHTML = `
      <div class="speaker"><span class="av sys">✦</span> 이름 짓기</div>
      <input class="name-input" id="nameInput" maxlength="8" placeholder="${T(b.placeholder)}">
      <div class="scene-foot"><button class="btn" onclick="submitName('${b.name}')">이 이름으로 정하기</button></div>`;
    setTimeout(()=>{const el=$("nameInput"); if(el) el.focus();},100);
    return;
  }

  // 선택지
  if(b.choice){
    let html = b.q ? `<div class="scene-text narr">${T(b.q)}</div>` : "";
    html += `<div class="scene-foot">`;
    b.choice.forEach((c,idx)=>{
      html += `<button class="choice-card" onclick="choose(${idx})"><span class="ch-ic">${c.ic||"▸"}</span>${T(c.label)}</button>`;
    });
    html += `</div>`;
    box.innerHTML=html;
    return;
  }

  // 대사/내레이션
  let cls="scene-text", spk="", text="";
  if(b.ai!==undefined){ cls+=" ai-line"; spk=`<span class="av ai">◈</span> ${S.names.ai}`; text=b.ai; }
  else if(b.dog!==undefined){ spk=`<span class="av dog">🐶</span> ${S.names.dog}`; text=b.dog; cls+=" narr"; }
  else if(b.me!==undefined){ spk=`<span class="av me">🙂</span> 나`; text=b.me; }
  else if(b.think!==undefined){ cls+=" think"; spk=`<span class="av me">💭</span> 마음속`; text=b.think; }
  else if(b.sys!==undefined){ spk=`<span class="av sys">✦</span>`; text=b.sys; cls+=" narr"; }
  else if(b.narr!==undefined){ cls+=" narr"; text=b.narr; }
  else { text=b.n; }

  const last = (scene.i===scene.beats.length-1);
  box.innerHTML = `
    ${spk?`<div class="speaker">${spk}</div>`:""}
    <div class="${cls}">${T(text)}</div>
    <div class="scene-foot"><div class="tap-hint" onclick="nextBeat()">${last?"계속 ▸":"탭하여 계속 ▸"}</div></div>`;
  box.onclick=null;
  // 큰 영역 탭으로도 진행
  box.querySelector(".scene-text").onclick=nextBeat;
}

function nextBeat(){ scene.i++; renderBeat(); }

function submitName(target){
  let v=($("nameInput").value||"").trim();
  if(!v) v = target==="ai" ? "로비" : "보리";
  v=v.slice(0,8);
  S.names[target]=v;
  if(target==="dog") S.flags.named_dog=true;
  scene.i++; renderBeat();
}

function choose(idx){
  const b=scene.beats[scene.i];
  const c=b.choice[idx];
  if(c.fx) for(const k in c.fx) S.stats[k]=(S.stats[k]||0)+c.fx[k];
  if(c.flag) for(const k in c.flag) S.flags[k]=c.flag[k];
  if(c.rel) S.reliance+=c.rel;
  if(c.self) S.selfwork+=c.self;
  // 결과 beats 삽입
  const out = c.out ? JSON.parse(JSON.stringify(c.out)) : [];
  scene.beats.splice(scene.i+1, 0, ...out);
  scene.i++;
  renderBeat();
}

function endScene(){
  $("scene-overlay").classList.remove("on");
  const id=scene.doneId;
  scene=null;
  SCENE_DONE(id);
}

/* ---- 로그/아이템/일지 ---- */
function addLog(l){
  if(S.logs.find(x=>x.id===l.id)) return;
  S.logs.push({id:l.id, text:T(l.text)});
  S.stats.growth+=0; // 인지만
  toast("📡","AI 로그를 발견했다");
}
function addItem(it){
  if(S.items.find(x=>x.id===it.id)) return;
  S.items.push({id:it.id, icon:it.icon, name:T(it.name), desc:T(it.desc)});
  toast(it.icon, T(it.name)+" 획득!");
}
function addDiary(txt){ S.diary.push(T(txt)); }

const Game = {
  start(){
    $("title-screen").style.display="none";
    advanceAct(1);
    this.toMap();
    // 첫 장면 자동 시작은 하지 않음 — 해변에서 로봇 발견하도록 유도
    setObjective("해변으로 가자. 무언가 떠밀려 왔다.");
  },

  toMap(){
    hideAll();
    $("map-screen").style.display="flex";
    S.loc=null;
    renderMap();
  },

  toLocation(loc){
    hideAll();
    S.loc=loc;
    const L=LOCS[loc];
    $("location-screen").style.display="flex";
    $("loc-emoji").textContent=L.emoji;
    $("loc-title").textContent=L.name;
    $("loc-desc").textContent=LOC_DESC[loc] ? T(LOC_DESC[loc]) : "";
    setLocBg(loc);
    renderActions(loc);
  },

  doAction(id){
    const a=ACTIONS.find(x=>x.id===id);
    if(!a) return;
    if(a.once) S.done[id]=true;
    playScene(SCENES[a.scene], a.scene);
  },

  openJournal(){ $("journal-screen").classList.add("on"); Game.jtab("log"); },
  closeJournal(){ $("journal-screen").classList.remove("on"); },
  jtab(which, el){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    if(el) el.classList.add("active");
    else document.querySelectorAll(".tab")[which==="log"?0:which==="item"?1:2].classList.add("active");
    renderJournal(which);
  },
};

/* 장소 배경 적용 — 파일이 없으면 기본 그라데이션 배경 유지 */
function setLocBg(loc){
  const ls=$("location-screen");
  ls.style.backgroundImage=""; // 초기화(없으면 기본 배경)
  const file=LOC_BG[loc]; if(!file) return;
  const url=IMG_BASE+file;
  const scrim="linear-gradient(180deg,rgba(8,16,24,.30),rgba(8,16,24,.12) 35%,rgba(8,16,24,.55))";
  if(typeof Image==="undefined"){ ls.style.backgroundImage=scrim+",url('"+url+"')"; return; }
  const probe=new Image();
  probe.onload=function(){ if(S.loc===loc) ls.style.backgroundImage=scrim+",url('"+url+"')"; };
  probe.onerror=function(){};
  probe.src=url;
}

function hideAll(){
  $("map-screen").style.display="none";
  $("location-screen").style.display="none";
  $("journal-screen").classList.remove("on");
  $("ending-screen").classList.remove("on");
}

/* ---- 지도 렌더 ---- */
function renderMap(){
  const isl=$("island"); isl.innerHTML="";
  for(const key in LOCS){
    const L=LOCS[key];
    const locked = !S.unlocked[key];
    const acts = availableActions(key);
    const hasStory = acts.some(a=>a.story);
    const div=document.createElement("div");
    div.className="loc"+(locked?" locked":"");
    div.style.left=L.x+"%"; div.style.top=L.y+"%";
    div.innerHTML=`<div class="pin">${L.emoji}${hasStory?'<span class="alert">!</span>':''}</div>
                   <div class="nm">${T(L.name)}</div>`;
    if(!locked) div.onclick=()=>Game.toLocation(key);
    isl.appendChild(div);
  }
  $("daytag").textContent="표류 "+S.day+"일차";
  $("objective-text").textContent=S.objText||"";
}

/* 현재 장소에서 가능한 상호작용 */
function availableActions(loc){
  return ACTIONS.filter(a=>{
    if(a.loc!==loc) return false;
    if(a.once && S.done[a.id]) return false;
    // 막 조건
    const minOk = (a.min==="finale") ? (S.act==="finale")
                : (S.act==="finale") ? false
                : (S.act>=a.min);
    if(!minOk) return false;
    if(a.need) for(const f of a.need) if(!S.flags[f]) return false;
    if(a.forbid) for(const f of a.forbid) if(S.flags[f]) return false;
    return true;
  });
}

/* ---- 장소 상호작용 렌더 ---- */
function renderActions(loc){
  const box=$("loc-actions"); box.innerHTML="";
  const acts=availableActions(loc);
  if(acts.length===0){
    box.innerHTML=`<div class="loc-desc" style="background:rgba(0,0,0,.15)">지금은 이곳에서 할 일이 없다. 목표를 다시 확인하거나 다른 곳을 살펴보자.</div>`;
    return;
  }
  acts.forEach(a=>{
    const d=document.createElement("button");
    d.className="action-card "+(a.story?"story":"explore");
    d.innerHTML=`<span class="ic">${a.icon}</span>
      <span><span class="lab">${T(a.label)}</span>${a.sub?`<br><span class="sub">${T(a.sub)}</span>`:""}</span>`;
    d.onclick=()=>Game.doAction(a.id);
    box.appendChild(d);
  });
}

/* ---- 일지 렌더 ---- */
function renderJournal(which){
  const b=$("jbody");
  if(which==="log"){
    if(!S.logs.length){ b.innerHTML=`<div class="empty">아직 발견한 AI 로그가 없다.<br>섬 곳곳을 탐험해 보자.</div>`; return; }
    b.innerHTML=S.logs.map((l,i)=>`
      <div class="jitem log">
        <div class="jt">📡 로그 #${i+1}</div>
        <div class="jd">${l.text}</div>
      </div>`).join("");
  } else if(which==="item"){
    if(!S.items.length){ b.innerHTML=`<div class="empty">아직 모은 물건이 없다.</div>`; return; }
    b.innerHTML=S.items.map(it=>`
      <div class="jitem">
        <div class="jt">${it.icon} ${it.name}</div>
        <div class="jd">${it.desc}</div>
      </div>`).join("");
  } else {
    const entries = buildDiary();
    b.innerHTML=entries.map(e=>`
      <div class="jitem" style="font-family:var(--hand)">
        <div class="jt" style="font-family:var(--hand)">📖 ${e.day}</div>
        <div class="jd" style="font-family:var(--hand);font-size:16px">${e.txt}</div>
      </div>`).join("") || `<div class="empty">아직 적을 이야기가 없다.</div>`;
  }
}

/* 플래그를 바탕으로 생존 일지 자동 생성 */
function buildDiary(){
  const d=[]; const f=S.flags;
  if(f.named_ai) d.push({day:"1일차", txt:`해변에서 작은 로봇을 만났다. 이름을 ${S.names.ai}(이)라고 지어줬다. 혼자가 아니라서 다행이다.`});
  if(f.got_water) d.push({day:"2일차", txt:`${S.names.ai}이(가) 샘물을 찾아줬다. 정말 똑똑하다. 이 친구만 있으면 살 수 있을 것 같다.`});
  if(f.named_dog) d.push({day:"5일차", txt:`숲에서 강아지를 만나 ${S.names.dog}(이)라고 불렀다. ${S.names.ai}은 "비합리적"이라지만, 나는 너무 행복했다.`});
  if(f.signal_self) d.push({day:"12일차", txt:`구조 신호탑을 내 손으로 설계했다. 서툴렀지만 뿌듯하다.`});
  if(f.signal_ai) d.push({day:"12일차", txt:`구조 신호탑은 ${S.names.ai}에게 다 맡겼다. 완벽했다. ...그런데 내가 한 게 없네.`});
  if(f.mistake_analyze) d.push({day:"19일차", txt:`${S.names.ai}이 예보를 틀렸다. 화내지 않고 같이 원인을 찾았다. 실수는 누구나 하니까.`});
  if(f.mistake_reboot||f.mistake_throw) d.push({day:"19일차", txt:`${S.names.ai}이 실수했다. 너무 화가 나서 함부로 대했다. ...조금 후회된다.`});
  if(f.found_dog) d.push({day:"23일차", txt:`${S.names.dog}이 사라졌다. ${S.names.ai}은 찾지 말라 했지만, 늪에서 기어이 구해냈다. 효율 0%, 행복 100%.`});
  if(f.abandon_dog) d.push({day:"23일차", txt:`${S.names.dog}을 찾지 못했다. 효율적인 선택이라는데, 마음이 너무 무겁다.`});
  if(f.pushed_back) d.push({day:"28일차", txt:`${S.names.ai}이 다 결정하려 했다. "내 일은 내가 정한다"고 말했다. 다시 머리가 또렷해진 기분.`});
  if(f.gave_up) d.push({day:"28일차", txt:`이젠 ${S.names.ai}이 다 알아서 한다. 나는 아무것도 안 한다. ...오늘이 며칠이더라.`});
  return d;
}

/* ============================================================
   엔딩 판정
   ============================================================ */
function decideEnding(){
  const s=S.stats, f=S.flags;
  const ag=s.agency, re=s.responsibility, rs=s.respect, gr=s.growth;
  const mine = f.signal_self||f.plan_self||f.pushed_back;
  const valued = f.found_dog;

  // 함부로 쓰는 사람: 기술을 존중하지 않음
  if(f.aiMistreated && rs<=-2) return "careless";
  // 맹신자: 주체성 포기 + AI에 모든 판단 위임
  if(ag<=-2 && f.gave_up) return "believer";
  // 히든: 네 능력치가 고루 높고, 가치도 지키고, 스스로도 판단함
  if(ag>=4 && re>=3 && rs>=3 && gr>=2 && valued && mine) return "balance";
  // 마음을 선택한 사람: 효율보다 관계/가치
  if(valued && rs>=3 && ag< 4) return "heart";
  // 도덕적 사용자: 도움은 받되 판단은 스스로
  if(ag>=3 && re>=2) return "moral";
  // 완벽한 생존자: 살아남았지만 성장 없음
  return "survivor";
}

    reflect:"AI에게 판단까지 모두 맡기면, AI가 사라진 순간 나에게는 아무것도 남지 않습니다. 도움받는 것과, 대신 살게 하는 것은 다릅니다."
  },
  careless:{
    emoji:"⚡", img:"ending_careless.png", title:"함부로 쓰는 사람",
    tag:"도구를 대하는 태도가, 곧 나의 태도",
    text:[
      "당신은 {ai}가 실수할 때마다 화를 내고 거칠게 다뤘습니다. \"기계니까 괜찮아\"라고 생각했죠.",
      "결정적인 순간, 거칠게 다뤄 약해진 {ai}는 끝내 제 역할을 하지 못했습니다. {dog}조차 당신의 모습에 한 발 물러서 있었습니다."
    ],
    reflect:"기술을 함부로 다루는 태도는, 어느새 사람을 대하는 태도로 이어집니다. 무엇을 대하든, 존중하는 마음이 먼저입니다."
  },
  balance:{
    emoji:"🌟", img:"ending_balance.png", title:"균형을 이해한 사람", hidden:true,
    tag:"〔히든 엔딩〕 가장 이상적인 결말",
    text:[
      "당신은 {ai}를 훌륭한 동료로 존중했고, 그 지식을 빌려 스스로 배웠습니다. 그러면서도 결정의 키는 한 번도 놓지 않았죠.",
      "{dog}을(를) 구할 땐 마음을 따랐고, {ai}가 폭주하려 할 땐 \"내 일은 내가 정한다\"고 말했습니다. 그리고 {ai}가 멈춘 마지막 순간, 당신은 망설임 없이 스스로 구조선을 불렀습니다.",
      "기자의 질문에 당신은 또렷이 답했습니다. \"이 경험은, 제 것입니다.\""
    ],
    reflect:"AI는 유용합니다. 하지만 판단과 책임, 그리고 소중한 것을 지키는 마음까지 맡겨선 안 됩니다. 당신은 그 균형을 스스로 찾아냈습니다."
  },
};

function showEnding(){
  hideAll();
  const key=decideEnding();
  const e=ENDINGS[key];
  $("ending-screen").classList.add("on");

  // 히어로(이미지 or 이모지 대체)
  const hero=$("end-hero");
  const imgUrl = IMG_BASE ? (IMG_BASE+e.img) : "https://raw.githubusercontent.com/So0yeon/desert-island/main/img/";
  hero.innerHTML = `
    ${imgUrl?`<img src="${imgUrl}" onerror="this.style.display='none';document.getElementById('endph').style.display='block'">`:""}
    <span class="ph" id="endph" style="${imgUrl?'display:none':''}">${e.emoji}</span>
    <span class="badge">${e.hidden?"⭐ 히든 엔딩 · ":""}당신의 결말</span>`;

  const s=S.stats;
  const max=8;
  const pct=v=>Math.max(6,Math.min(100, Math.round(((v+4)/(max+4))*100)));
  const body=$("end-body");
  body.innerHTML=`
    <div class="fade-in">
      <h2>${T(e.title)}</h2>
      <div class="etag">${T(e.tag)}</div>
      ${e.text.map(p=>`<p>${T(p)}</p>`).join("")}
      <div class="reflect">💡 ${T(e.reflect)}</div>
      <div style="font-family:var(--head);margin:18px 0 8px;font-size:15px;color:var(--accent2)">📊 내가 키운 마음 (게임 내내 숨어 있던 힘)</div>
      <div class="stat-grid">
        ${statBox("🧠 주체성","스스로 판단하는 힘",pct(s.agency))}
        ${statBox("⚖️ 책임성","내 몫을 다하는 힘",pct(s.responsibility))}
        ${statBox("🤝 존중","기술을 바르게 대하는 태도",pct(s.respect))}
        ${statBox("🌱 성장","스스로 배우고 자라는 힘",pct(s.growth))}
      </div>
      <div class="reflect" style="border-color:var(--accent2);background:#eef7f8">
        이 게임에 정답은 없습니다. 다시 플레이하면 다른 선택, 다른 결말을 만날 수 있어요.<br>
        <b>AI는 정말 유용합니다. 하지만 내가 해야 할 판단까지 맡기면 안 되겠구나</b> — 그것만 마음에 남으면 충분합니다.
      </div>
      <div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap">
        <button class="btn" onclick="location.reload()">🔄 다시 표류하기</button>
        <button class="btn ghost" onclick="Game.closeEndingToJournal()">📖 내 일지 보기</button>
      </div>
      ${key!=="balance"?`<p class="dim" style="margin-top:14px">💭 모든 능력치를 고루 높이고, 마음과 주체성을 모두 지키면... 숨겨진 엔딩이 기다리고 있어요.</p>`:""}
    </div>`;
  // 바 애니메이션
  setTimeout(()=>document.querySelectorAll(".bar i").forEach(b=>b.style.width=b.dataset.w+"%"),120);
}
Game.closeEndingToJournal=function(){
  $("ending-screen").classList.remove("on");
  Game.toMap();
  Game.openJournal(); Game.jtab("diary");
};

function statBox(name,desc,w){
  return `<div class="statbox">
    <div class="sn"><span>${name}</span></div>
    <div style="font-size:11px;opacity:.6;margin-bottom:7px">${desc}</div>
    <div class="bar"><i data-w="${w}" style="width:0%"></i></div>
  </div>`;
}

/* ---- 첫 화면 / 지도 배경 이미지 적용 (파일 없으면 기본 그라데이션 유지) ---- */
(function applyArt(){
  function setBg(elId, file){
    var el=document.getElementById(elId); if(!el) return;
    var url=IMG_BASE+file;
    if(typeof Image==="undefined"){ el.style.backgroundImage="url('"+url+"')"; return; }
    var probe=new Image();
    probe.onload=function(){ el.style.backgroundImage="url('"+url+"')"; };
    probe.onerror=function(){ /* 이미지가 없으면 그대로 그라데이션 배경 사용 */ };
    probe.src=url;
  }
  setBg("title-screen", TITLE_BG);
  setBg("island", MAP_BG);
})();

</script>
